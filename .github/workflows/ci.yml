name: Validate Orphee

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate project structure and syntax
        run: python scripts/validate_project.py

      - name: Run tests
        run: python -m pytest

      - name: Run static checks
        run: python -m ruff check .

      - name: Verify Streamlit import
        run: python -c "import streamlit; import orphee_core; import moteur_phonetique"
